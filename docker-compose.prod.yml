version: '3.8'

# Production compose file — run with: docker compose -f docker-compose.prod.yml up -d

services:
  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.25-alpine
    container_name: stego-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - stego-backend
      - stego-frontend
    networks:
      - stego-network

  # ── PostgreSQL ──
  stego-db:
    image: postgres:16-alpine
    container_name: stego-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - stego_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stego-network

  # ── Backend ──
  stego-backend:
    image: ${BACKEND_IMAGE:-stego-backend:latest}
    container_name: stego-backend
    restart: unless-stopped
    depends_on:
      stego-db:
        condition: service_healthy
    environment:
      DB_HOST: stego-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
    networks:
      - stego-network

  # ── Frontend ──
  stego-frontend:
    image: ${FRONTEND_IMAGE:-stego-frontend:latest}
    container_name: stego-frontend
    restart: unless-stopped
    depends_on:
      - stego-backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost}
    networks:
      - stego-network

volumes:
  stego_pgdata:
    driver: local

networks:
  stego-network:
    driver: bridge
